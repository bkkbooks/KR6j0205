body:
  text: 東晉天竺三藏佛陀跋陀羅譯如是我聞一時佛在毗舍離大林精舍重閣講堂與大比丘衆四萬人俱爾時世尊欲捨壽行却後三月當般涅槃便告長老大目揵連汝行遍告三千大千世界聲聞比丘并緣覺道及諸菩薩皆悉來會大林精舍重閣講堂目連受教往須彌頂入如意定以大音聲遍告三千大千世界無不聞知長老舍利弗作是念我今亦當入如意定普請依止閻浮提內諸比丘皆悉來會大林精舍重閣講堂作是念已即如其像入于三昧遍請諸比丘依止閻浮提者皆來集會爾時大林精舍重閣講堂有三百萬比丘衆會於是世尊告現無癡菩薩文殊師利童子離惡趣菩薩無憂冥菩薩離蔭蓋菩薩寂諸境界菩薩觀世音菩薩香象菩薩無量辨菩薩彌勒菩薩汝等善男子行詣十方恆河沙諸佛國土遍告諸一生補處菩薩不退轉菩薩得不起法忍菩薩信解菩薩皆悉來集大林精舍重閣講堂是諸菩薩即受教行遍告十方恆沙佛土諸一生補處菩薩及不退轉得不起法忍信解菩薩皆來集會大林精舍重閣講堂是時大林精舍重閣講堂有八十億百千一生補處菩薩一億百千得不退轉三十億菩薩得不起法忍六十億菩薩得信解脫是諸大士一時來會大林精舍重閣講堂爾時尊者舍利弗見諸菩薩大衆雲集便作是念我當承佛威神敬問世尊令諸菩薩得離疑網疾成甚深無閡辨才逮聞十方恆沙剎土諸佛説法念持不忘疾成無上正真之道為最正覺又使菩薩得四無盡清淨法門何等為四一曰衆生淨二曰法淨三曰辨才淨四曰佛土嚴淨得四最勝和悅之法何等為四一曰身和悅二曰口和悅三曰意和悅四曰方便和悅疾成四種微妙持門何等為四一曰出生無量門持二曰甚深法忍持三曰善於衆生諸根持四曰善於衆生因果持尊者舍利弗思惟是菩薩清淨無量慧地欲令佛説即以是義上問世尊於是世尊讚舍利弗言善哉善哉舍利弗乃能為諸菩薩問如是義汝舍利弗諦聽諦聽善思念之我今當説菩薩所行疾成無上正真之道甚深功德若舍利弗欲得一切智知一切法者當學此門持當學此持句所謂無句正句普句成就樂説光明順道善分別究竟分別堅固所説堅固伊羅伊梨伊羅悉帝旃二為履上迹不動寂靜離諸怨敵熾然永滅出生無垢清淨自性巧説諸有者無所有無所著善能降伏光明離垢善自攝持果而大勇得大名稱動無動以正動難堅固善住安隱遊無閡著開諸法門隨順所應強而有勢精進勇猛得方便力大光普照明曜無垢意解平等普無不入事無不逝此善妙持諸佛所住如是舍利弗行持菩薩於數無數不以分別亦無所得於諸斷法增進功德而無所作亦無不作不見諸法有合有離有起有滅亦無去來現在之知亦不知法有力無力修行念佛不念相好不念種性亦不念眷屬不戒不定不慧不解亦無解脫度知見念無住無得不盡煩惱不以知無不知不言説法不淨衆生不我故非彼故不法不律不威儀無清淨不念身不念意無涅槃究竟亦不念過去當來今現在不因己不因他於一切法行無受者舍利弗是名執受一切諸法隨順念佛名為一切諸法所入無畏持門微妙句義一切所欲皆悉周備名為隨順一道三昧亦名一切善本不由他得種性相好因自法生名為正覺度諸魔事舍利弗是為菩薩出生無量門持其有聞是持者皆於阿耨多羅三藐三菩提得不退轉所以者何從是持究竟一切諸佛功德悉能分別一切衆生之所行處得無所得故名出生無量門持爾時世尊而説偈言法空無疑惑為道不放逸法性無忘想是行疲得持是經如所説彼持無有盡從是生妙智疾成無上道若得此持者菩薩無所畏十方佛説法如所説悉聞一切能受持義味悉具足日生無量光持生智如是乃至無上法微妙諸持門一切從是句當善護此經正使一切人窮劫思難問悉能決定疑其智不可盡近無上道坐為真法王子持法者親厚常念斯經故衆生所敬重十方佛護念名稱遍十方執持此經故八十億諸佛臨終悉能見一切皆授手接此持經者若於億千劫造諸不善業一月可以除當受誦此經菩薩所興福億劫來積聚善誦此持經一月等於彼念力精進力三昧勝妙持悉皆現在前疾成最正覺三界衆生類一切悉為魔不能令中斷修習是經者從彼誠諦説從彼究竟法從彼得成道逮得一切智昔聞是持故定光授我決恆沙等諸佛即時悉能現欲聞十方佛所説悉能解當專習此持一切疾得成莊嚴佛國土清淨衆成就光相及種性當從是經得得除心放逸七日專思念八十億諸佛俱來授此經不思思所思亦不思無思此思亦無思從是疾得成尊崇是經教於道莫疑惑譬如大海中不應疑無寶欲安諸天人一切願不難此為道心生但當正意行復次舍利弗菩薩成就四法疾得是持何等為四厭離愛欲不生疾心於一切衆生施一切有晝夜求法心不懈惓爾時世尊而説偈言厭離於色欲魔界地獄緣放逸造衆惡惡令墮惡道於他不起妬不為於名稱愍愛視衆生尊貴色端嚴衆生起怨諍皆以貪為本是故當捨愛愛捨成妙持晝夜常樂法推異推道求專精求道者疾得成妙持又舍利弗菩薩復有四法成就疾得是持何等為四間居寂志得深法忍不求利養一切內外盡施無遺是為四爾時世尊而説偈言間居寂志佛所譽自守空靜不輕彼常樂修習深法忍如救頭然不放逸不求名譽及利養因斯造諸諂曲行處處知足如飛鳥節身損己修仁行快哉得佛教出家受具戒捨家離衆苦遵修於佛教若不得佛教出家是戒利信戒施聞慧皆悉不成就此過離佛遠是故捨貪利又舍利弗菩薩復有四法成就疾得是持何等為四一曰八字是義隨義悉入其中八字者波羅婆迦闍陀賒叉波者第一義一切諸法無我悉來入門羅者相好無相如如來身入於法性婆者愚癡之法及智慧法隨順入義迦者業行果報及非業行報皆悉究竟隨順入義闍者生緣老死皆悉隨入不生不滅陀者一切諸持悉隨入空無相無願賒者一切諸持皆隨順入叉者盡一切諸法悉入於如是如是八字是義悉入其中二曰善書此經執持不捨三曰半月半月誦習此經四曰常當供給供養持此經者爾時世尊而説偈言當思八字義善書持此經半月次來誦勸發行持者一切十方恆沙國無量諸佛在其前得坐道場妙相滿當勤修習此持行復次舍利弗菩薩學此持者得四功德利何等為四一者十方諸佛所念二者離諸魔事三者惡罪業障疾得清淨四者無礙斷辨才皆悉成就是為四爾時世尊而説偈言諸佛常護念衆魔不得便罪業障悉除得妙無量持佛告舍利弗乃昔過去無數劫時有佛世尊號寶首焰王如來應供等正覺明行成善逝世間解無上士調御丈夫天人師佛世尊舍利弗彼寶首焰王如來臨滅度時有轉輪王名曰持光明王四天下快得自在王有太子名無念德道其初生時形如十六歲童子從彼世尊得聞此持聞此持已專精求學經七千歲不為睡眠之所蔭蓋七千歲中未曾起身愛未曾念王事又七千歲中身不猗臥端坐正受於是即見九十億那由他諸佛從其聞法皆能受持便出家學道九萬歲中以是無量門出生之持廣為人説於一生中成就八十億那由他人立阿耨多羅三藐三菩提心勸進教化令不退轉彼時衆中有長者子名曰月幢得聞是持至心隨喜彼以隨喜善根因緣故常得親近九十億佛得最上持得最上處無量辨才復於三劫親近諸佛三劫末時月幢得佛號燈光如來應供等正覺彼時王子無念德道者今西方無量壽佛是舍利弗我亦與賢劫諸菩薩曾聞此持聞已隨喜以此隨喜善根因緣除却四十萬劫生死之罪又得親近九十億佛是故舍利弗若菩薩摩訶薩欲得疾成阿耨多羅三藐三菩提者於此妙持當勤隨喜隨喜功德乃至菩薩不退轉地作大因緣況復書持受誦如説修行一切人民莫能思量稱説其福爾時世尊而説偈言聞經心隨喜書持敬諷誦天人莫能計福報之限量生生常見佛信向不回動體解深法要疾覺無上道三昧不退減三明總持門財色常見佛乃至無上道憶念過去世長者子聞持即見九十億那由他諸佛所求如其願得成無上道若欲疾成佛道力降衆魔欲滿百福相行此非有難如滿恆沙剎積寶以布施比書持此經終不得為比又舍利弗菩薩行此持者有八大鬼是雪山之神共護視之其名曰勇健神強力神自在神雄猛神知行神難勝神鳩摩羅神善臂神是為八彼欲令諸神來者當澡浴其身淨其衣服正色經行慈念衆生思是法要如其憶念彼諸神等尋現在前復有八菩薩生欲行天亦常護念何等為八照明十方天子離欲行天子慧光天子如日天子真諦天子願滿天子星王天子知行天子是為八是等菩薩常來護念令彼專精疾得妙持行是持者真實為本而常恭敬當念知恩學深法忍等觀無生無滅之法平等持戒自護兼彼説是法時三十二恆河沙等菩薩尋得是持不退轉於阿耨多羅三藐三菩提六十萬人得不起法忍三萬二千天與人皆發無上正真道意是時三千大千世界六種震動天雨衆華普遍世界天發伎樂不鼓自鳴是時舍利弗白佛言世尊當何名此經佛告舍利弗此經之要名出生無量門持亦名一生補處道行亦名成道降魔得一切智當奉持之説是法時尊者舍利弗及諸十方來會菩薩并諸衆會天與人乾闥婆阿修羅等聞佛所説皆大歡喜
